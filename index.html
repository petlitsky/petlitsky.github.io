<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Comfortaa&family=Kelly+Slab&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/font-awesome.min.css">
	<title>Time to work</title>
</head>
<body>

	<div class="day-time">
		<i class="fa fa-clock-o fa-2x" aria-hidden="true"></i>
		<div class="day">Day</div>
		<div class="time">00:00:00</div>
	</div>

	<div class="timer">
		00:00:00:000
	</div>

	<div class="help">
		Press the "Space" start, stop or restart the timer
	</div>

	<div class="footer">
		<a title="GitHub"><i class="fa fa-github fa-3x" aria-hidden="true"></i></a>
		<a title="VK"><i class="fa fa-vk fa-3x" aria-hidden="true"></i></a>
		<a title="My Site"><i class="fa fa-code fa-3x" aria-hidden="true"></i></a>
	</div>

	<script type="text/javascript" src="js/app.js"></script>
</body>
</html>
